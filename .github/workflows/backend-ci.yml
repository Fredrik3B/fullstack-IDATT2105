name: Backend CI

on:
  push:
    branches: [ "master" ]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Verify build
        run: ./mvnw verify