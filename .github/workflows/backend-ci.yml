name: backend CI

on:
  push:
    branches: [ "master", "dev" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [ "master", "dev" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Debug paths
        run: |
          pwd
          ls -la
          ls -la backend

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Verify build
        run: backend/mvnw -f backend/pom.xml verify