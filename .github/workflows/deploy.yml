name: Deploy

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests
        working-directory: ./backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/restaurantapp-frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          echo "VITE_API_BASE_URL=http://${{ secrets.VPS_HOST }}" > .env.production
          npm run build
        working-directory: ./frontend/restaurantapp-frontend

      - name: Copy backend JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/target/*.jar"
          target: "/home/${{ secrets.VPS_USER }}/"

      - name: Copy frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/restaurantapp-frontend/dist/"
          target: "/home/${{ secrets.VPS_USER }}/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cp /home/${{ secrets.VPS_USER }}/backend/target/*.jar /opt/fullstack-ic/backend.jar
            rm -rf /var/www/fullstack-ic/*
            cp -r /home/${{ secrets.VPS_USER }}/frontend/restaurantapp-frontend/dist/* /var/www/fullstack-ic/
            sudo systemctl restart fullstack-ic
            rm -rf /home/${{ secrets.VPS_USER }}/backend /home/${{ secrets.VPS_USER }}/frontend