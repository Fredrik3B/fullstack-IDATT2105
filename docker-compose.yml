services:
  mysql:
    image: mysql:latest
    container_name: app-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: app-backend
    env_file:
      - .env.local
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app_db
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_pass
    ports:
      - "8080:8080"
    profiles: ["run"]

  frontend:
    build: ./frontend
    container_name: app-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    profiles: ["run"]

  backend-test:
    build:
      context: ./backend
    container_name: backend-test
    command: mvn test
    environment:
      SPRING_PROFILES_ACTIVE: test
    profiles: ["test"]

  frontend-test:
    build: ./frontend
    container_name: frontend-test
    command: npx vite
    environment:
      DOCKER: "true"
    depends_on:
      - backend-test
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles: ["test"]

  cypress:
    image: cypress/included
    container_name: cypress
    working_dir: /e2e
    volumes:
      - ./frontend/cypress:/e2e/cypress
      - ./frontend/cypress.config.js:/e2e/cypress.config.js
      - cypress_cache:/root/.cache/Cypress
    depends_on:
      frontend-test:
        condition: service_healthy
    environment:
      CYPRESS_baseUrl: http://frontend-test:5173
      CYPRESS_INSTALL_BINARY: 0 
    entrypoint: /bin/sh
    command: >
      -c "npx cypress run --headless"
    profiles: ["test"]

volumes:
  mysql_data:
  cypress_cache:
