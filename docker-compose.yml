services:
  mysql:
    image: mysql:latest
    container_name: app-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: app-backend
    env_file:
      - .env.local
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app_db
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_pass
    ports:
      - "8080:8080"
    profiles: ["run"]

  frontend:
    build: ./frontend
    container_name: app-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    profiles: ["run"]

  backend-test:
    build:
      context: ./backend
    container_name: backend-test
    command: mvn test
    environment:
      SPRING_PROFILES_ACTIVE: test
    profiles: ["test"]

  frontend-test:
    build: ./frontend
    container_name: frontend-test
    command: npm run dev
    depends_on:
      - backend-test
    ports:
      - "5173:5173"
    profiles: ["test"]

  cypress:
    image: cypress/included:13.6.0
    container_name: cypress
    working_dir: /e2e
    volumes:
      - ./frontend:/e2e
    depends_on:
      - frontend-test
    environment:
      CYPRESS_baseUrl: http://frontend-test:5173
    command: >
      sh -c "npx wait-on http://frontend-test:5173 &&
           npx cypress run"
    profiles: ["test"]

volumes:
  mysql_data: